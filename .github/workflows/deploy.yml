name: ResumeRight CI/CD Pipeline

on:
  push:
    branches: [mai]
  workflow_dispatch:
    inputs:
      destroy:
        description: 'Type DESTROY to tear down all infrastructure'
        required: false
        default: ''

env:
  AWS_REGION: ap-south-1
  TF_DIR: ./terraform

jobs:
  ###########################################################################
  # JOB 1 — Tests
  ###########################################################################
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm ci

      - name: Verify server syntax
        run: node --check server.js

      - name: Run health check
        run: echo "✅ Syntax OK"

  ###########################################################################
  # JOB 2 — Terraform Apply (provision / update infra)
  ###########################################################################
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: test
    if: github.event.inputs.destroy != 'DESTROY'
    outputs:
      alb_dns:        ${{ steps.tf_output.outputs.alb_dns }}
      s3_bucket:      ${{ steps.tf_output.outputs.s3_bucket }}
      cf_frontend_id: ${{ steps.tf_output.outputs.cf_frontend_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="mongo_uri=${{ secrets.MONGO_URI }}" \
            -var="admin_key=${{ secrets.ADMIN_KEY }}" \
            -out=tfplan
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TF_DIR }}

      - name: Capture outputs
        id: tf_output
        run: |
          echo "alb_dns=$(terraform output -raw alb_dns)"             >> $GITHUB_OUTPUT
          echo "s3_bucket=$(terraform output -raw s3_bucket)"         >> $GITHUB_OUTPUT
          echo "cf_frontend_id=$(terraform output -raw cf_frontend_id)" >> $GITHUB_OUTPUT
        working-directory: ${{ env.TF_DIR }}

      # Save state as artifact so destroy job can use it
      - name: Upload Terraform state
        uses: actions/upload-artifact@v4
        with:
          name: tfstate
          path: ${{ env.TF_DIR }}/terraform.tfstate
          retention-days: 30

  ###########################################################################
  # JOB 3 — Deploy Backend to EC2 via SSM
  ###########################################################################
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: terraform-apply

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Get EC2 instance ID from ASG
        id: get_instance
        run: |
          INSTANCE_ID=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "resumeright-asg" \
            --query "AutoScalingGroups[0].Instances[0].InstanceId" \
            --output text)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "🖥️  Instance: $INSTANCE_ID"

      - name: Deploy via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ steps.get_instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "cd /home/ubuntu",
              "if [ -d backend/.git ]; then cd backend && git pull; else git clone https://github.com/${{ github.repository }}.git backend && cd backend; fi",
              "npm ci --production",
              "pm2 restart resumeright || pm2 start ecosystem.config.js",
              "pm2 save"
            ]' \
            --output text \
            --query "Command.CommandId"

      - name: Health check
        run: |
          ALB="${{ needs.terraform-apply.outputs.alb_dns }}"
          echo "Waiting 30s for server to be ready..."
          sleep 30
          curl --fail --retry 5 --retry-delay 10 "http://$ALB/" | jq .

  ###########################################################################
  # JOB 4 — Deploy Frontend to S3
  ###########################################################################
  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs: terraform-apply

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Upload frontend to S3
        run: |
          aws s3 sync . s3://${{ needs.terraform-apply.outputs.s3_bucket }}/ \
            --exclude "*" \
            --include "index.html" \
            --include "admin.html" \
            --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.terraform-apply.outputs.cf_frontend_id }} \
            --paths "/*"

  ###########################################################################
  # JOB 5 — Manual approval gate → then DESTROY
  # Only runs when triggered manually with input = "DESTROY"
  ###########################################################################
  request-destroy-approval:
    name: "⚠️ Waiting for Destroy Approval"
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.destroy == 'DESTROY'
    environment:
      name: production          # ← configure approval in GitHub → Environments → production

    steps:
      - name: Approval pending
        run: |
          echo "🔴 Destroy requested."
          echo "A repo admin must approve in GitHub → Actions → This run → Review deployments."
          echo "Approve = infrastructure will be DELETED."
          echo "Reject  = nothing happens, infra stays up."

  terraform-destroy:
    name: "💣 Terraform Destroy"
    runs-on: ubuntu-latest
    needs: request-destroy-approval
    if: |
      always() &&
      needs.request-destroy-approval.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download Terraform state
        uses: actions/download-artifact@v4
        with:
          name: tfstate
          path: ${{ env.TF_DIR }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve \
            -var="mongo_uri=${{ secrets.MONGO_URI }}" \
            -var="admin_key=${{ secrets.ADMIN_KEY }}"
        working-directory: ${{ env.TF_DIR }}

      - name: Confirm destruction
        run: echo "✅ All AWS resources destroyed. MongoDB Atlas (free tier) is unaffected."
