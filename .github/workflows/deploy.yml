name: ResumeRight CI/CD Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

env:
  AWS_REGION: ap-south-1
  TF_DIR: ./terraform
  APP_NAME: resumeright

jobs:
  #############################################################################
  # JOB 1 — Tests
  ###########################################################################
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Verify server syntax
        run: node --check server.js
        working-directory: backend

      - name: Verify app syntax
        run: node --check app.js
        working-directory: backend

  ###########################################################################
  # JOB 2 — Terraform Apply (provision / update infra)
  ###########################################################################
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: test
    if: github.event.inputs.destroy != 'DESTROY'
    outputs:
      instance_id:    ${{ steps.tf_output.outputs.instance_id }}
      ec2_public_ip:  ${{ steps.tf_output.outputs.ec2_public_ip }}
      s3_bucket:      ${{ steps.tf_output.outputs.s3_bucket }}
      uploads_bucket: ${{ steps.tf_output.outputs.uploads_bucket }}
      cf_frontend_id: ${{ steps.tf_output.outputs.cf_frontend_id }}
      frontend_url:   ${{ steps.tf_output.outputs.frontend_url }}
      api_url:        ${{ steps.tf_output.outputs.api_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init (S3 backend)
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=resumeright/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="mongo_uri=${{ secrets.MONGO_URI }}" \
            -var="admin_key=${{ secrets.ADMIN_KEY }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="razorpay_key_id=${{ secrets.RAZORPAY_KEY_ID }}" \
            -var="razorpay_key_secret=${{ secrets.RAZORPAY_KEY_SECRET }}" \
            -var="razorpay_webhook_secret=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}" \
            -var="github_repo=https://github.com/${{ github.repository }}.git" \
            -out=tfplan
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TF_DIR }}

      - name: Capture outputs
        id: tf_output
        run: |
          {
            echo "instance_id=$(terraform output -raw instance_id)"
            echo "ec2_public_ip=$(terraform output -raw ec2_public_ip)"
            echo "s3_bucket=$(terraform output -raw s3_bucket)"
            echo "uploads_bucket=$(terraform output -raw uploads_bucket)"
            echo "cf_frontend_id=$(terraform output -raw cf_frontend_id)"
            echo "frontend_url=$(terraform output -raw frontend_url)"
            echo "api_url=$(terraform output -raw api_url)"
          } >> "$GITHUB_OUTPUT"
        working-directory: ${{ env.TF_DIR }}

      - name: Print EC2 public IP (for Atlas allowlist)
        run: |
          echo "========================================================"
          echo "EC2 Elastic IP: ${{ steps.tf_output.outputs.ec2_public_ip }}"
          echo "Instance ID:    ${{ steps.tf_output.outputs.instance_id }}"
          echo ""
          echo "Add the Elastic IP above to MongoDB Atlas → Network Access"
          echo "allowlist (one-time step). It's stable across every deploy"
          echo "and only changes on 'terraform destroy'."
          echo "========================================================"

  ###########################################################################
  # JOB 3 — Deploy Backend to EC2 via SSM
  # Clones the repo fresh on every deploy, fetches secrets from SSM on the
  # instance (role has ssm:GetParameter + kms:Decrypt), writes the full .env,
  # installs deps, and reloads pm2. This means the first-boot bootstrap's
  # incomplete .env never matters — deploy always overwrites it.
  ###########################################################################
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: terraform-apply

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Wait for SSM agent to be online
        run: |
          INSTANCE_ID="${{ needs.terraform-apply.outputs.instance_id }}"
          for i in {1..30}; do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null || echo "None")
            if [ "$STATUS" = "Online" ]; then
              echo "SSM agent online"
              exit 0
            fi
            echo "Waiting for SSM agent... ($i/30) status=$STATUS"
            sleep 10
          done
          echo "ERROR: SSM agent not online after 5 minutes" >&2
          exit 1

      - name: Deploy via SSM
        id: deploy
        run: |
          INSTANCE_ID="${{ needs.terraform-apply.outputs.instance_id }}"
          UPLOADS_BUCKET="${{ needs.terraform-apply.outputs.uploads_bucket }}"
          # Custom domain takes precedence; CloudFront URL is fallback.
          # Backend CORS allowlist includes both new domain (apex + www) and the
          # CloudFront URL so direct CloudFront access keeps working during cutover.
          CF_FRONTEND_URL="${{ needs.terraform-apply.outputs.frontend_url }}"
          FRONTEND_URL="https://resumeright.co.in,https://www.resumeright.co.in,${CF_FRONTEND_URL}"
          REPO_URL="https://github.com/${{ github.repository }}.git"
          COMMIT_SHA="${{ github.sha }}"

          # Build the remote script. Heredoc is safer than JSON array escapes.
          # The script is self-sufficient: it installs node/npm/pm2/git if the
          # bootstrap hasn't finished yet, so the deploy never races the userdata.
          #
          # IMPORTANT: SSM AWS-RunShellScript runs each command via /bin/sh,
          # which on Ubuntu is dash (no `set -o pipefail`, no `{1..N}` brace
          # expansion, no bashisms). So the OUTER wrapper is pure POSIX sh: it
          # just writes the real bash script to /tmp/deploy.sh and invokes it
          # with `bash`. All the bashisms live inside the inner deploy script.
          cat > /tmp/remote.sh <<REMOTE
          cat > /tmp/deploy.sh <<'DEPLOY_EOF'
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          export AWS_REGION=${AWS_REGION}
          export APP_DIR=/home/ubuntu/app
          export BACKEND_DIR=\$APP_DIR/backend

          echo "==> Ensuring prereqs (apt/node/npm/git/pm2)"
          # Wait up to 3 min for any running apt/dpkg from bootstrap to finish
          for i in {1..36}; do
            if ! fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 && \
               ! fuser /var/lib/apt/lists/lock >/dev/null 2>&1; then
              break
            fi
            echo "  apt/dpkg busy, waiting... (\$i/36)"
            sleep 5
          done

          # Node 20 is required (backend uses optional chaining, ?.). Some
          # AMIs ship Node 12 via apt's nodejs package — if that's present,
          # the old `command -v node` check would short-circuit. So always
          # check the MAJOR version and upgrade when <20.
          NODE_MAJOR=\$(node -v 2>/dev/null | sed 's/^v//;s/\\..*//' || echo 0)
          if [ "\${NODE_MAJOR:-0}" -lt 20 ]; then
            echo "==> Installing Node 20.x (current major: \$NODE_MAJOR)"
            # Remove any stale apt nodejs first — NodeSource's setup script
            # will fail if an older nodejs is holding the /usr/bin/node link.
            apt-get remove -y nodejs npm libnode72 libnode-dev 2>/dev/null || true
            curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
            apt-get install -y nodejs
          fi
          command -v git  >/dev/null 2>&1 || apt-get install -y git
          command -v pm2  >/dev/null 2>&1 || npm install -g pm2
          command -v jq   >/dev/null 2>&1 || apt-get install -y jq

          # AWS CLI v2 — Ubuntu AMIs don't ship it. We need it for ssm
          # get-parameter (the script below fetches MONGO_URI, ADMIN_KEY,
          # JWT_SECRET from Parameter Store using the instance-profile role).
          if ! command -v aws >/dev/null 2>&1; then
            echo "==> Installing AWS CLI v2"
            apt-get install -y unzip curl ca-certificates
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            unzip -q -o /tmp/awscliv2.zip -d /tmp
            /tmp/aws/install --update
          fi

          echo "node: \$(node -v) | npm: \$(npm -v) | pm2: \$(pm2 -v) | git: \$(git --version) | aws: \$(aws --version)"

          echo "==> Cloning / updating repo at \$APP_DIR"
          if [ ! -d "\$APP_DIR/.git" ]; then
            rm -rf "\$APP_DIR"
            sudo -u ubuntu git clone ${REPO_URL} "\$APP_DIR"
          fi
          cd "\$APP_DIR"
          sudo -u ubuntu git fetch --all --prune
          sudo -u ubuntu git reset --hard ${COMMIT_SHA}

          echo "==> Fetching secrets from SSM"
          MONGO_URI=\$(aws ssm get-parameter --with-decryption --name "/${APP_NAME}/MONGO_URI"  --query Parameter.Value --output text)
          ADMIN_KEY=\$(aws ssm get-parameter --with-decryption --name "/${APP_NAME}/ADMIN_KEY"  --query Parameter.Value --output text)
          JWT_SECRET=\$(aws ssm get-parameter --with-decryption --name "/${APP_NAME}/JWT_SECRET" --query Parameter.Value --output text)

          # Razorpay — optional. Missing param = empty string (payments disabled).
          RAZORPAY_KEY_ID=\$(aws ssm get-parameter --with-decryption --name "/${APP_NAME}/RAZORPAY_KEY_ID" --query Parameter.Value --output text 2>/dev/null || echo "")
          RAZORPAY_KEY_SECRET=\$(aws ssm get-parameter --with-decryption --name "/${APP_NAME}/RAZORPAY_KEY_SECRET" --query Parameter.Value --output text 2>/dev/null || echo "")
          RAZORPAY_WEBHOOK_SECRET=\$(aws ssm get-parameter --with-decryption --name "/${APP_NAME}/RAZORPAY_WEBHOOK_SECRET" --query Parameter.Value --output text 2>/dev/null || echo "")

          echo "==> Writing .env (0600)"
          umask 077
          cat > "\$BACKEND_DIR/.env.new" <<ENV
          NODE_ENV=production
          PORT=5000
          MONGO_URI=\$MONGO_URI
          DB_NAME=${APP_NAME}
          ADMIN_KEY=\$ADMIN_KEY
          JWT_SECRET=\$JWT_SECRET
          JWT_EXPIRES_IN=7d
          BCRYPT_ROUNDS=12
          AWS_REGION=${AWS_REGION}
          S3_BUCKET_UPLOADS=${UPLOADS_BUCKET}
          CORS_ORIGINS=${FRONTEND_URL}
          RATE_LIMIT_WINDOW_MS=900000
          RATE_LIMIT_MAX=100
          RAZORPAY_KEY_ID=\$RAZORPAY_KEY_ID
          RAZORPAY_KEY_SECRET=\$RAZORPAY_KEY_SECRET
          RAZORPAY_WEBHOOK_SECRET=\$RAZORPAY_WEBHOOK_SECRET
          ENV
          chown ubuntu:ubuntu "\$BACKEND_DIR/.env.new"
          mv "\$BACKEND_DIR/.env.new" "\$BACKEND_DIR/.env"

          echo "==> Installing deps + starting pm2"
          # Kill any stale 'resumeright' process from first-boot bootstrap
          sudo -u ubuntu bash -lc "pm2 delete resumeright || true"
          sudo -u ubuntu bash -lc "cd \$BACKEND_DIR && npm ci --omit=dev"
          sudo -u ubuntu bash -lc "cd \$BACKEND_DIR && pm2 start ecosystem.config.js --update-env"
          sudo -u ubuntu bash -lc "pm2 save"

          # Enable pm2 on reboot (idempotent)
          env PATH=\$PATH:/usr/bin pm2 startup systemd -u ubuntu --hp /home/ubuntu >/dev/null 2>&1 || true

          echo "==> pm2 status"
          sudo -u ubuntu pm2 jlist | jq '.[].pm2_env | {name, status, restart_time}'

          echo "==> Local health probe (port 5000)"
          # Poll localhost until /healthz responds. If after ~30s the app is
          # still not listening, dump pm2 logs + state and fail LOUDLY so
          # the SSM step reports a real failure instead of a silent success.
          HEALTHY=0
          for i in {1..15}; do
            if curl -fsS --max-time 3 http://127.0.0.1:5000/healthz >/tmp/hz 2>&1; then
              echo "  local healthz OK: \$(cat /tmp/hz)"
              HEALTHY=1
              break
            fi
            sleep 2
          done

          echo "==> Listening ports (should show :5000)"
          ss -ltnp 2>/dev/null || netstat -ltnp 2>/dev/null || true

          echo "==> pm2 logs (last 80 lines)"
          sudo -u ubuntu pm2 logs resumeright --lines 80 --nostream 2>&1 || true

          if [ "\$HEALTHY" -ne 1 ]; then
            echo "!! Local /healthz never responded. The app is not listening on :5000." >&2
            echo "!! Check the pm2 logs above for the real error (missing env, bad MONGO_URI, etc)." >&2
            exit 1
          fi
          DEPLOY_EOF
          chmod +x /tmp/deploy.sh
          bash /tmp/deploy.sh
          REMOTE

          # Build the SSM payload as a proper JSON file. Passing the script
          # via `--parameters commands=<jq-encoded>` mangles newlines because
          # shell re-parses the escapes. `--cli-input-json` with jq-built JSON
          # preserves newlines correctly.
          jq -n \
            --arg instance "$INSTANCE_ID" \
            --arg comment  "ResumeRight deploy ${COMMIT_SHA}" \
            --rawfile script /tmp/remote.sh \
            '{
              InstanceIds: [$instance],
              DocumentName: "AWS-RunShellScript",
              Comment: $comment,
              TimeoutSeconds: 900,
              Parameters: { commands: [$script] }
            }' > /tmp/ssm-payload.json

          CMD_ID=$(aws ssm send-command \
            --cli-input-json file:///tmp/ssm-payload.json \
            --query "Command.CommandId" \
            --output text)
          echo "SSM command: $CMD_ID"
          echo "cmd_id=$CMD_ID" >> "$GITHUB_OUTPUT"

          # Poll until done (InProgress / Pending -> Success / Failed / TimedOut)
          # We DON'T use `aws ssm wait` because it exits non-zero on Failed and
          # then `set -e` kills the step before we can print the logs.
          for i in {1..90}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query Status --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) break ;;
            esac
            echo "  SSM status: $STATUS ($i/90)"
            sleep 10
          done

          echo "---- SSM stdout ----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query StandardOutputContent --output text || true
          echo "---- SSM stderr ----"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query StandardErrorContent --output text || true
          echo "---- Final status: $STATUS ----"
          [ "$STATUS" = "Success" ] || { echo "SSM deploy failed: $STATUS"; exit 1; }

      - name: Health check (process alive)
        run: |
          EIP="${{ needs.terraform-apply.outputs.ec2_public_ip }}"
          echo "Probing http://$EIP:5000/healthz ..."
          for i in {1..20}; do
            if curl --fail --silent --max-time 5 "http://$EIP:5000/healthz" | grep -q '"ok":true'; then
              echo "Backend process is healthy"
              exit 0
            fi
            echo "Not ready yet ($i/20)"
            sleep 10
          done
          echo "Health check failed" >&2
          exit 1

      - name: DB connectivity check
        run: |
          EIP="${{ needs.terraform-apply.outputs.ec2_public_ip }}"
          echo "Probing http://$EIP:5000/ (DB-dependent) ..."
          # Retry for up to 2min — server.js connects to Mongo in the background
          # with exponential backoff after listen, so / can return 503 briefly
          # right after deploy even when Atlas is reachable.
          for i in {1..24}; do
            RESP=$(curl --silent --max-time 5 "http://$EIP:5000/" || echo '')
            if echo "$RESP" | grep -q '"status":"ResumeRight backend OK"'; then
              echo "DB is connected: $RESP"
              exit 0
            fi
            echo "DB not ready ($i/24): ${RESP:-no response}"
            sleep 5
          done
          echo "::error title=DB not connected::Backend process is up but cannot reach MongoDB."
          echo "::error::Likely cause: EC2 Elastic IP ($EIP) is not in Atlas Network Access allowlist."
          echo "::error::Fix: add $EIP to Atlas → Network Access (one-time; EIP is stable)."
          exit 1

  ###########################################################################
  # JOB 4 — Deploy Frontend to S3
  ###########################################################################
  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs: terraform-apply

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Inject API URL into frontend
        working-directory: frontend
        env:
          # Custom api domain (resolves via Route 53 → CloudFront → EC2).
          # Falls back to terraform's CloudFront output if custom domain is unset.
          API_URL: https://api.resumeright.co.in
        run: |
          # Single source of truth: API_URL above. We sed-replace
          # the __API_URL__ placeholder in the HTML files right before upload,
          # so the committed source never has a hardcoded CloudFront domain.
          # If CloudFront gets recreated, the next deploy auto-heals.
          if [ -z "$API_URL" ]; then
            echo "::error::API_URL is empty — aborting frontend deploy"
            exit 1
          fi
          echo "Injecting API_URL=$API_URL into HTML files"
          # -i'' works on both GNU sed (Ubuntu) and BSD sed; using | as delimiter
          # avoids escaping slashes in the URL.
          sed -i "s|__API_URL__|$API_URL|g" index.html admin.html
          # Fail loud if any placeholder remains
          if grep -l '__API_URL__' index.html admin.html 2>/dev/null; then
            echo "::error::__API_URL__ placeholder still present after sed"
            exit 1
          fi
          echo "Verification: API const in index.html:"
          grep -n "const API" index.html || true

      - name: Upload frontend to S3
        working-directory: frontend
        run: |
          aws s3 sync . s3://${{ needs.terraform-apply.outputs.s3_bucket }}/ \
            --exclude "*" \
            --include "index.html" \
            --include "admin.html" \
            --include "privacy.html" \
            --include "terms.html" \
            --include "refund.html" \
            --include "contact.html" \
            --include "favicon.svg" \
            --include "assets/*" \
            --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.terraform-apply.outputs.cf_frontend_id }} \
            --paths "/*"

  ###########################################################################
  # JOB 5 — Manual approval gate → then DESTROY
  # Only runs when triggered manually with input = "DESTROY"
  ###########################################################################
  request-destroy-approval:
    name: "Waiting for Destroy Approval"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.destroy == 'DESTROY'
    environment:
      name: production          # configure required reviewers in GitHub → Environments → production

    steps:
      - name: Approval pending
        run: |
          echo "Destroy requested."
          echo "A repo admin must approve in GitHub → Actions → this run → Review deployments."

  terraform-destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    needs: request-destroy-approval
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.destroy == 'DESTROY'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init (S3 backend)
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=resumeright/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve \
            -var="mongo_uri=${{ secrets.MONGO_URI }}" \
            -var="admin_key=${{ secrets.ADMIN_KEY }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="razorpay_key_id=${{ secrets.RAZORPAY_KEY_ID }}" \
            -var="razorpay_key_secret=${{ secrets.RAZORPAY_KEY_SECRET }}" \
            -var="razorpay_webhook_secret=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}" \
            -var="github_repo=https://github.com/${{ github.repository }}.git"
        working-directory: ${{ env.TF_DIR }}

      - name: Confirm destruction
        run: echo "All AWS resources destroyed. MongoDB Atlas (free tier) is unaffected."
