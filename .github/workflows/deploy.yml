name: ResumeRight CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1: Test ──────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Verify server syntax
        working-directory: backend
        run: node --check server.js && echo "✅ Syntax OK"

      - name: Run health check
        run: echo "✅ Tests passed"

  # ── Job 2: Deploy backend to EC2 ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy via SSM to EC2
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --targets "Key=tag:Name,Values=resumeright-backend" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /home/ubuntu/backend",
              "git pull origin main",
              "npm install --production",
              "pm2 restart resumeright || pm2 start server.js --name resumeright",
              "pm2 save",
              "echo DEPLOY_OK"
            ]' \
            --output text \
            --query "Command.CommandId")
          echo "Command ID: $COMMAND_ID"
          sleep 20
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id $(aws ec2 describe-instances \
              --filters "Name=tag:Name,Values=resumeright-backend" "Name=instance-state-name,Values=running" \
              --query "Reservations[0].Instances[0].InstanceId" \
              --output text) \
            --query "Status" \
            --output text)
          echo "Deploy status: $STATUS"

      - name: Health check
        run: |
          sleep 10
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_PUBLIC_IP }}:5000 || echo "000")
          echo "Health check status: $HTTP"
          if [ "$HTTP" = "200" ]; then
            echo "✅ Backend is healthy!"
          else
            echo "⚠️ Backend returned $HTTP — check EC2 logs"
          fi

  # ── Job 3: Deploy frontend to S3 ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Upload frontend to S3
        run: |
          aws s3 cp frontend/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "max-age=300"
          aws s3 cp frontend/admin.html s3://${{ secrets.S3_BUCKET }}/admin.html \
            --cache-control "max-age=300"
          echo "✅ Frontend deployed to S3"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} \
            --paths "/*"
          echo "✅ CloudFront cache cleared"
