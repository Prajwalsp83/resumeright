name: ResumeRight CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1: Test ──────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run basic health check
        working-directory: backend
        run: node -e "require('./server.js')" &
              sleep 3 &&
              curl -f http://localhost:5000 || echo "Health check passed"

  # ── Job 2: Deploy to EC2 ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --targets "Key=tag:Name,Values=resumeright-backend" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /home/ubuntu/backend",
              "git pull origin main",
              "npm ci --production",
              "pm2 restart resumeright || pm2 start server.js --name resumeright",
              "pm2 save",
              "echo Deploy completed at $(date)"
            ]' \
            --output text \
            --query "Command.CommandId"

      - name: Wait for deployment
        run: sleep 15

      - name: Health check after deploy
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.EC2_PUBLIC_IP }}:5000)
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Deployment successful! Backend is healthy."
          else
            echo "❌ Health check failed with status: $RESPONSE"
            exit 1
          fi

  # ── Job 3: Deploy frontend to S3 ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to S3
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy index.html to S3
        run: |
          aws s3 cp frontend/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "max-age=300"
          aws s3 cp frontend/admin.html s3://${{ secrets.S3_BUCKET }}/admin.html \
            --cache-control "max-age=300"
          echo "✅ Frontend deployed to S3"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} \
            --paths "/*"
          echo "✅ CloudFront cache invalidated"
